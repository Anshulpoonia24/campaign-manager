<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Authenticating...</title>
<style>
body { font-family: 'Inter', sans-serif; display: flex; align-items: center; justify-content: center; min-height: 100vh; background: #f8fafc; margin: 0; }
.box { text-align: center; padding: 40px; }
.spin { width: 36px; height: 36px; border: 3px solid #e5e7eb; border-top: 3px solid #6366f1; border-radius: 50%; animation: spin 0.7s linear infinite; margin: 0 auto 16px; }
@keyframes spin { to { transform: rotate(360deg); } }
p { color: #6B7280; font-size: 14px; }
</style>
</head>
<body>
<div class="box">
  <div class="spin"></div>
  <p>Completing sign in with Google...</p>
</div>
<script>
// Supabase sends tokens in URL fragment (#access_token=...&refresh_token=...)
const hash = window.location.hash.substring(1);
const params = new URLSearchParams(hash);
const accessToken = params.get('access_token');

if (accessToken) {
  fetch('/auth/google/token', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ access_token: accessToken })
  })
  .then(r => r.json())
  .then(d => {
    if (d.success) {
      window.location.href = d.redirect || '/dashboard';
    } else {
      window.location.href = '/login?error=google_failed';
    }
  })
  .catch(() => { window.location.href = '/login?error=google_failed'; });
} else {
  // No token — check for error
  const error = params.get('error_description') || new URLSearchParams(window.location.search).get('error');
  if (error) {
    window.location.href = '/login?error=' + encodeURIComponent(error);
  } else {
    window.location.href = '/login';
  }
}
</script>
</body>
</html>
