<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Contact — OutreachOS</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
<link href="/static/landing.css" rel="stylesheet">
<style>
.contact-form { max-width: 500px; margin: 48px auto 0; }
.form-group { margin-bottom: 20px; }
.form-group label { display: block; font-size: 13px; font-weight: 600; color: var(--text-secondary); margin-bottom: 6px; }
.form-group input, .form-group textarea {
  width: 100%; padding: 12px 16px; border-radius: 10px; font-size: 14px;
  background: rgba(255,255,255,0.04); border: 1px solid var(--border-color);
  color: var(--text-primary); font-family: inherit; outline: none;
  transition: border-color 0.2s;
}
.form-group input:focus, .form-group textarea:focus { border-color: var(--accent); }
.form-group textarea { min-height: 120px; resize: vertical; }
</style>
</head>
<body>
<div class="bg-grid"></div>
<div class="bg-glow"></div>

<nav class="nav">
  <div class="nav-inner">
    <div class="nav-logo">OutreachOS</div>
    <div class="nav-links">
      <a href="/">Home</a>
      <a href="/solutions">Solutions</a>
      <a href="/blogs">Blogs</a>
      <a href="/contact">Contact Us</a>
    </div>
    <div class="nav-cta">
      <a href="/login" class="btn btn-ghost">Login</a>
      <a href="/register" class="btn btn-primary">Start Free</a>
    </div>
  </div>
</nav>

<section class="section" style="padding-top:140px;">
  <div style="text-align:center;">
    <div class="section-label">Contact</div>
    <h1 class="section-title">Let's talk</h1>
    <p class="section-subtitle" style="margin:0 auto;">Have questions about OutreachOS? Want a custom plan? Reach out and we'll get back within 24 hours.</p>
  </div>

  <div class="contact-form">
    <form action="/contact" method="POST">
      <div class="form-group">
        <label>Name</label>
        <input type="text" name="name" placeholder="Your name" required>
      </div>
      <div class="form-group">
        <label>Email</label>
        <input type="email" name="email" placeholder="you@company.com" required>
      </div>
      <div class="form-group">
        <label>Company</label>
        <input type="text" name="company" placeholder="Your company">
      </div>
      <div class="form-group">
        <label>Message</label>
        <textarea name="message" placeholder="How can we help?" required></textarea>
      </div>
      <button type="submit" class="btn btn-primary" style="width:100%;justify-content:center;">Send Message →</button>
    </form>
  </div>
</section>

<footer class="footer">
  <div class="footer-bottom">© 2024 OutreachOS. All rights reserved.</div>
</footer>
</body>
</html>
