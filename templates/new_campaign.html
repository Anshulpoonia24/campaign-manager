<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"><title>New Campaign</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link href="/static/style.css" rel="stylesheet">
</head>
<body>
    <div class="sidebar">
        <div class="brand"><i class="fas fa-paper-plane"></i> Campaign Manager</div>
        <a href="/"><i class="fas fa-chart-line"></i> Dashboard</a>
        <a href="/upload"><i class="fas fa-upload"></i> Upload Contacts</a>
        <a href="/contacts"><i class="fas fa-users"></i> Contacts</a>
        <a href="/campaigns" class="active"><i class="fas fa-bullhorn"></i> Campaigns</a>
        <a href="/follow_ups"><i class="fas fa-reply"></i> Follow-ups</a>
        <a href="/bounced"><i class="fas fa-exclamation-triangle"></i> Bounced</a>
        <a href="/logs"><i class="fas fa-list-alt"></i> Logs</a>
        <hr style="border-color:#e2e8f0">
        <a href="/settings"><i class="fas fa-cog"></i> Settings</a>
        <a href="/logout" style="color:#ef4444;"><i class="fas fa-sign-out-alt"></i> Logout</a>
    </div>
    <div class="main">
        <h3 class="mb-4">🆕 New Campaign</h3>
        <div class="form-box" style="max-width:500px;">
            <form method="POST">
                <div class="mb-3">
                    <label class="form-label">Campaign Name</label>
                    <input type="text" name="campaign_name" class="form-control" placeholder="e.g. AI Startup Outreach - May 2026" required>
                </div>
                <div class="mb-3">
                    <label class="form-label">Description (optional)</label>
                    <textarea name="description" class="form-control" rows="3" placeholder="Campaign ka purpose, target audience..."></textarea>
                </div>
                <button type="submit" class="btn btn-primary w-100">Create Campaign</button>
            </form>
        </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
