<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin Login — OutreachOS</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: 'Inter', sans-serif;
  background: #0f172a;
  min-height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
}
.card {
  background: #fff;
  border-radius: 18px;
  padding: 40px 36px;
  width: 100%;
  max-width: 380px;
  box-shadow: 0 20px 60px rgba(0,0,0,0.3);
}
.brand {
  text-align: center;
  margin-bottom: 28px;
}
.brand-icon {
  width: 48px; height: 48px;
  background: linear-gradient(135deg, #6366f1, #8b5cf6);
  border-radius: 13px;
  display: flex; align-items: center; justify-content: center;
  margin: 0 auto 12px;
  box-shadow: 0 4px 16px rgba(99,102,241,0.35);
}
.brand-icon i { color: #fff; font-size: 18px; }
.brand h2 { font-size: 1.1rem; font-weight: 800; color: #0f172a; margin: 0 0 3px; }
.brand .sub { font-size: 12px; color: #9CA3AF; }
.admin-badge {
  display: inline-block;
  background: #fef3c7; color: #92400e;
  border: 1px solid #fde68a;
  font-size: 10px; font-weight: 700;
  padding: 2px 8px; border-radius: 99px;
  text-transform: uppercase; letter-spacing: 0.5px;
  margin-top: 6px;
}
.field-group { margin-bottom: 16px; }
.field-label { font-size: 12px; font-weight: 600; color: #374151; margin-bottom: 6px; display: block; }
.field-input {
  width: 100%; background: #f9fafb;
  border: 1px solid #e5e7eb; border-radius: 9px;
  padding: 11px 13px; font-size: 14px; color: #111827;
  font-family: 'Inter', sans-serif; outline: none;
  transition: border-color 0.15s, box-shadow 0.15s;
}
.field-input:focus {
  border-color: #6366f1;
  box-shadow: 0 0 0 3px rgba(99,102,241,0.1);
  background: #fff;
}
.btn-login {
  width: 100%; padding: 12px; border: none; border-radius: 10px;
  background: linear-gradient(135deg, #6366f1, #8b5cf6);
  color: #fff; font-size: 14px; font-weight: 700;
  cursor: pointer; font-family: 'Inter', sans-serif;
  box-shadow: 0 2px 10px rgba(99,102,241,0.3);
  transition: opacity 0.15s, transform 0.15s;
  margin-top: 4px;
}
.btn-login:hover { opacity: 0.9; transform: translateY(-1px); }
.error-msg {
  background: #fef2f2; border: 1px solid #fecaca;
  color: #dc2626; border-radius: 8px;
  padding: 9px 12px; font-size: 12.5px; font-weight: 500;
  margin-bottom: 16px; display: flex; align-items: center; gap: 7px;
}
.tenant-link {
  text-align: center; margin-top: 20px;
  font-size: 12px; color: #9CA3AF;
}
.tenant-link a { color: #6366f1; text-decoration: none; }
.tenant-link a:hover { text-decoration: underline; }
</style>
</head>
<body>
<div class="card">
  <div class="brand">
    <div class="brand-icon"><i class="fas fa-shield-alt"></i></div>
    <h2>OutreachOS</h2>
    <div class="sub">Infrastructure Console</div>
    <div class="admin-badge">Super Admin</div>
  </div>

  {% if error %}
  <div class="error-msg">
    <i class="fas fa-exclamation-circle"></i> {{ error }}
  </div>
  {% endif %}

  <form method="POST">
    <div class="field-group">
      <label class="field-label">Admin Username</label>
      <input type="text" name="username" class="field-input" placeholder="Enter admin username" required autofocus autocomplete="username">
    </div>
    <div class="field-group">
      <label class="field-label">Password</label>
      <input type="password" name="password" class="field-input" placeholder="Enter password" required autocomplete="current-password">
    </div>
    <button type="submit" class="btn-login">
      <i class="fas fa-shield-alt me-2"></i>Access Admin Panel
    </button>
  </form>

  <div class="tenant-link">
    Tenant login? <a href="/login">Go to tenant login →</a>
  </div>
</div>
</body>
</html>
