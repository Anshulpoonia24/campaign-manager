<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin Login — OutreachOS</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Inter',sans-serif;background:#f8fafc;min-height:100vh;display:flex;align-items:center;justify-content:center;-webkit-font-smoothing:antialiased;}
.card{background:#fff;border-radius:18px;padding:44px 40px;width:100%;max-width:400px;border:1px solid #e2e8f0;box-shadow:0 8px 40px rgba(15,23,42,0.08);}
.brand{text-align:center;margin-bottom:32px;}
.brand-icon{width:52px;height:52px;background:linear-gradient(135deg,#6366f1,#8b5cf6);border-radius:14px;display:flex;align-items:center;justify-content:center;margin:0 auto 14px;box-shadow:0 4px 16px rgba(99,102,241,0.25);}
.brand-icon i{color:#fff;font-size:20px;}
.brand h2{font-size:18px;font-weight:800;color:#0f172a;margin:0 0 4px;}
.brand .sub{font-size:12.5px;color:#64748b;font-weight:500;}
.admin-badge{display:inline-block;background:#eef2ff;color:#4338ca;border:1px solid #c7d2fe;font-size:10px;font-weight:700;padding:3px 10px;border-radius:99px;text-transform:uppercase;letter-spacing:.5px;margin-top:8px;}
.field-group{margin-bottom:18px;}
.field-label{font-size:12px;font-weight:600;color:#374151;margin-bottom:7px;display:block;}
.field-input{width:100%;background:#f9fafb;border:1px solid #e2e8f0;border-radius:10px;padding:12px 14px;font-size:14px;color:#0f172a;font-family:'Inter',sans-serif;outline:none;transition:border-color .15s,box-shadow .15s;}
.field-input:focus{border-color:#6366f1;box-shadow:0 0 0 3px rgba(99,102,241,0.08);background:#fff;}
.field-input::placeholder{color:#94a3b8;}
.btn-login{width:100%;padding:13px;border:none;border-radius:10px;background:linear-gradient(135deg,#6366f1,#8b5cf6);color:#fff;font-size:14px;font-weight:700;cursor:pointer;font-family:'Inter',sans-serif;box-shadow:0 2px 12px rgba(99,102,241,0.25);transition:opacity .15s,transform .15s;margin-top:6px;}
.btn-login:hover{opacity:.92;transform:translateY(-1px);}
.error-msg{background:#fef2f2;border:1px solid #fecaca;color:#dc2626;border-radius:10px;padding:10px 14px;font-size:12.5px;font-weight:500;margin-bottom:18px;display:flex;align-items:center;gap:8px;}
.error-msg i{font-size:13px;}
.tenant-link{text-align:center;margin-top:22px;font-size:12px;color:#94a3b8;}
.tenant-link a{color:#6366f1;font-weight:600;text-decoration:none;}
.tenant-link a:hover{text-decoration:underline;}
</style>
</head>
<body>
<div class="card">
  <div class="brand">
    <div class="brand-icon"><i class="fas fa-shield-alt"></i></div>
    <h2>OutreachOS</h2>
    <div class="sub">Platform Administration</div>
    <div class="admin-badge"><i class="fas fa-lock" style="margin-right:4px;font-size:8px;"></i>Super Admin</div>
  </div>

  {% if error %}
  <div class="error-msg">
    <i class="fas fa-exclamation-circle"></i> {{ error }}
  </div>
  {% endif %}

  <form method="POST">
    <div class="field-group">
      <label class="field-label">Username</label>
      <input type="text" name="username" class="field-input" placeholder="Admin username" required autofocus autocomplete="username">
    </div>
    <div class="field-group">
      <label class="field-label">Password</label>
      <div style="position:relative;">
        <input type="password" name="password" id="pwField" class="field-input" placeholder="Enter password" required autocomplete="off" style="padding-right:40px;">
        <i class="fas fa-eye" id="pwToggle" onclick="togglePw()" style="position:absolute;right:14px;top:50%;transform:translateY(-50%);color:#94a3b8;cursor:pointer;font-size:13px;"></i>
      </div>
    </div>
    <button type="submit" class="btn-login">
      <i class="fas fa-arrow-right" style="margin-right:8px;"></i>Sign In
    </button>
  </form>

  <div class="tenant-link">
    Looking for workspace login? <a href="/login">Go to tenant login →</a>
  </div>
</div>
<script>
function togglePw(){const f=document.getElementById('pwField'),i=document.getElementById('pwToggle');f.type=f.type==='password'?'text':'password';i.className=f.type==='password'?'fas fa-eye':'fas fa-eye-slash';}
</script>
</body>
</html>
