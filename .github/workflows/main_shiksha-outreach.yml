name: Test and validate OutreachOS

on:
  push:
    branches: [ main, devvvvvvvvvv ]
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Validate app loads
        run: python -c "from app import app; print('App loads OK')"
        env:
          SECRET_KEY: test-secret-key-for-ci
