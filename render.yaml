services:
  - type: web
    name: outreachos
    env: python
    region: oregon
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn --bind 0.0.0.0:$PORT --timeout 600 --workers 1 --threads 8 --worker-class gthread app:app
    healthCheckPath: /login
    envVars:
      - key: PYTHON_VERSION
        value: 3.12.0
      - key: DATABASE_URL
        sync: false
      - key: SECRET_KEY
        generateValue: true
      - key: TRACKING_HOST
        sync: false
      - key: IMAP_SERVER
        sync: false
      - key: IMAP_PORT
        value: "993"
      - key: IMAP_USERNAME
        sync: false
      - key: IMAP_PASSWORD
        sync: false
      - key: IMAP_CHECK_INTERVAL
        value: "180"
      - key: REPLY_TO
        sync: false
      - key: GROQ_API_KEYS
        sync: false
      - key: GEMINI_API_KEY
        sync: false
      - key: AI_PRIORITY
        value: groq,gemini
      - key: SMTP_SERVER
        value: smtp.hostinger.com
      - key: SMTP_PORT
        value: "587"
      - key: SMTP_USERNAME
        sync: false
      - key: SMTP_PASSWORD
        sync: false
      - key: FROM_EMAIL
        sync: false
      - key: FROM_NAME
        sync: false
      - key: ADMIN_USERNAME
        value: superadmin
      - key: ADMIN_PASSWORD
        sync: false
      - key: SUPABASE_URL
        value: https://ygbwqhxxmfdvrenbpcnw.supabase.co
      - key: SUPABASE_ANON_KEY
        sync: false
